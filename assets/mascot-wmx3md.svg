<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <!-- 배경 그라데이션 -->
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </radialGradient>
    <!-- 몸체 그라데이션 (청록/시안 계열 - 모션 제어 느낌) -->
    <radialGradient id="bodyGrad" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#2d7a8a"/>
      <stop offset="60%" stop-color="#1e5c6a"/>
      <stop offset="100%" stop-color="#163f4d"/>
    </radialGradient>
    <!-- 눈 글로우 -->
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#e8f4f8"/>
      <stop offset="100%" stop-color="#b8dce8"/>
    </radialGradient>
    <!-- 외곽 글로우 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="1080" height="1080" fill="url(#bgGrad)"/>

  <!-- 배경 그리드 -->
  <g opacity="0.08" stroke="#4ecdc4" stroke-width="0.5">
    <line x1="0" y1="100" x2="1080" y2="100"/>
    <line x1="0" y1="200" x2="1080" y2="200"/>
    <line x1="0" y1="300" x2="1080" y2="300"/>
    <line x1="0" y1="400" x2="1080" y2="400"/>
    <line x1="0" y1="500" x2="1080" y2="500"/>
    <line x1="0" y1="600" x2="1080" y2="600"/>
    <line x1="0" y1="700" x2="1080" y2="700"/>
    <line x1="0" y1="800" x2="1080" y2="800"/>
    <line x1="0" y1="900" x2="1080" y2="900"/>
    <line x1="100" y1="0" x2="100" y2="1080"/>
    <line x1="200" y1="0" x2="200" y2="1080"/>
    <line x1="300" y1="0" x2="300" y2="1080"/>
    <line x1="400" y1="0" x2="400" y2="1080"/>
    <line x1="500" y1="0" x2="500" y2="1080"/>
    <line x1="600" y1="0" x2="600" y2="1080"/>
    <line x1="700" y1="0" x2="700" y2="1080"/>
    <line x1="800" y1="0" x2="800" y2="1080"/>
    <line x1="900" y1="0" x2="900" y2="1080"/>
    <line x1="1000" y1="0" x2="1000" y2="1080"/>
  </g>

  <!-- 배경 장식: 모션 경로 (좌측) -->
  <g opacity="0.25" stroke="#4ecdc4" stroke-width="1.5" fill="none">
    <!-- 좌측 모션 파형 -->
    <path d="M 30,340 Q 80,310 130,340 Q 180,370 230,340 Q 280,310 330,340" opacity="0.5"/>
    <path d="M 30,680 Q 80,650 130,680 Q 180,710 230,680 Q 280,650 330,680" opacity="0.5"/>
    <!-- 우측 모션 파형 -->
    <path d="M 750,340 Q 800,310 850,340 Q 900,370 950,340 Q 1000,310 1050,340" opacity="0.5"/>
    <path d="M 750,680 Q 800,650 850,680 Q 900,710 950,680 Q 1000,650 1050,680" opacity="0.5"/>
  </g>

  <!-- 좌측 수평 라인 (통신 버스) -->
  <g stroke="#2d7a8a" stroke-width="2" opacity="0.5">
    <line x1="100" y1="430" x2="310" y2="430"/>
    <line x1="120" y1="460" x2="310" y2="460"/>
    <line x1="140" y1="490" x2="310" y2="490"/>
    <line x1="120" y1="520" x2="310" y2="520"/>
    <line x1="100" y1="550" x2="310" y2="550"/>
  </g>

  <!-- 우측 수평 라인 (통신 버스) -->
  <g stroke="#2d7a8a" stroke-width="2" opacity="0.5">
    <line x1="770" y1="430" x2="980" y2="430"/>
    <line x1="770" y1="460" x2="960" y2="460"/>
    <line x1="770" y1="490" x2="940" y2="490"/>
    <line x1="770" y1="520" x2="960" y2="520"/>
    <line x1="770" y1="550" x2="980" y2="550"/>
  </g>

  <!-- 장식 별 -->
  <g fill="#4ecdc4" opacity="0.6">
    <text x="100" y="160" font-size="20" font-family="monospace">*</text>
    <text x="950" y="120" font-size="20" font-family="monospace">*</text>
    <text x="80" y="880" font-size="20" font-family="monospace">*</text>
    <text x="990" y="850" font-size="20" font-family="monospace">*</text>
    <text x="560" y="100" font-size="16" font-family="monospace">*</text>
  </g>

  <!-- 상단: 기어 이빨 (모션 제어 상징) -->
  <g stroke="#3a8a9a" stroke-width="2.5" opacity="0.6">
    <line x1="390" y1="200" x2="390" y2="255"/>
    <line x1="390" y1="200" x2="380" y2="210"/>
    <line x1="390" y1="200" x2="400" y2="210"/>

    <line x1="430" y1="190" x2="430" y2="250"/>
    <line x1="430" y1="190" x2="420" y2="200"/>
    <line x1="430" y1="190" x2="440" y2="200"/>

    <line x1="470" y1="185" x2="470" y2="248"/>
    <line x1="470" y1="185" x2="460" y2="195"/>
    <line x1="470" y1="185" x2="480" y2="195"/>

    <line x1="510" y1="182" x2="510" y2="246"/>
    <line x1="510" y1="182" x2="500" y2="192"/>
    <line x1="510" y1="182" x2="520" y2="192"/>

    <line x1="550" y1="182" x2="550" y2="246"/>
    <line x1="550" y1="182" x2="540" y2="192"/>
    <line x1="550" y1="182" x2="560" y2="192"/>

    <line x1="590" y1="185" x2="590" y2="248"/>
    <line x1="590" y1="185" x2="580" y2="195"/>
    <line x1="590" y1="185" x2="600" y2="195"/>

    <line x1="630" y1="190" x2="630" y2="250"/>
    <line x1="630" y1="190" x2="620" y2="200"/>
    <line x1="630" y1="190" x2="640" y2="200"/>

    <line x1="670" y1="200" x2="670" y2="255"/>
    <line x1="670" y1="200" x2="660" y2="210"/>
    <line x1="670" y1="200" x2="680" y2="210"/>
  </g>

  <!-- 메인 몸체: 외곽 글로우 -->
  <circle cx="540" cy="490" r="215" fill="none" stroke="#4ecdc4" stroke-width="1.5" opacity="0.3" filter="url(#bigGlow)"/>

  <!-- 메인 몸체 -->
  <circle cx="540" cy="490" r="200" fill="url(#bodyGrad)" stroke="#3a8a9a" stroke-width="2" opacity="0.95"/>

  <!-- 몸체 내부 하이라이트 -->
  <ellipse cx="500" cy="430" rx="120" ry="80" fill="#3a9aaa" opacity="0.1"/>

  <!-- LED 표시등 (주황 - 모션 활성 표시) -->
  <circle cx="370" cy="360" r="12" fill="#ff8c42" filter="url(#glow)"/>
  <circle cx="370" cy="360" r="6" fill="#ffb380" opacity="0.8"/>

  <!-- 눈 (큰 단일 눈) -->
  <circle cx="540" cy="440" r="82" fill="url(#eyeGlow)" filter="url(#softGlow)"/>
  <circle cx="540" cy="440" r="72" fill="#e8f4f8"/>
  <circle cx="540" cy="440" r="55" fill="#1a3040"/>
  <circle cx="540" cy="440" r="38" fill="#0d1f2d"/>
  <!-- 눈 하이라이트 -->
  <circle cx="555" cy="425" r="12" fill="#ffffff" opacity="0.9"/>
  <circle cx="530" cy="450" r="5" fill="#ffffff" opacity="0.5"/>

  <!-- 입 (디스플레이 패널) -->
  <rect x="460" y="545" width="160" height="80" rx="8" fill="#163f4d" stroke="#2d7a8a" stroke-width="1" opacity="0.7"/>
  <!-- 입 표정 (미소 곡선 - 시안색) -->
  <path d="M 490,585 Q 540,605 590,585" fill="none" stroke="#4ecdc4" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>

  <!-- 양쪽 팔 (둥근 돌출부) -->
  <ellipse cx="345" cy="500" rx="22" ry="30" fill="#1e5c6a" stroke="#2d7a8a" stroke-width="1" opacity="0.6"/>
  <ellipse cx="735" cy="500" rx="22" ry="30" fill="#1e5c6a" stroke="#2d7a8a" stroke-width="1" opacity="0.6"/>

  <!-- 발 -->
  <ellipse cx="470" cy="730" rx="35" ry="22" fill="#1e5c6a" stroke="#2d7a8a" stroke-width="1.5" opacity="0.6"/>
  <ellipse cx="610" cy="730" rx="35" ry="22" fill="#1e5c6a" stroke="#2d7a8a" stroke-width="1.5" opacity="0.6"/>

  <!-- 하단: 모션 화살표 장식 -->
  <g opacity="0.3" stroke="#4ecdc4" stroke-width="1.5" fill="none">
    <!-- 회전 화살표 (좌) -->
    <path d="M 200,780 A 30,30 0 1,1 200,750"/>
    <polygon points="200,750 195,760 205,760" fill="#4ecdc4" stroke="none"/>
    <!-- 회전 화살표 (우) -->
    <path d="M 880,780 A 30,30 0 1,0 880,750"/>
    <polygon points="880,750 875,760 885,760" fill="#4ecdc4" stroke="none"/>
  </g>

  <!-- 타이틀: WMX3MD -->
  <text x="540" y="870" text-anchor="middle" font-family="'Arial Black', 'Impact', sans-serif" font-size="72" font-weight="900" fill="#2d7a8a" letter-spacing="6" filter="url(#softGlow)">WMX3MD</text>
  <text x="540" y="870" text-anchor="middle" font-family="'Arial Black', 'Impact', sans-serif" font-size="72" font-weight="900" fill="#4ecdc4" letter-spacing="6" opacity="0.7">WMX3MD</text>

  <!-- 서브타이틀 -->
  <text x="540" y="920" text-anchor="middle" font-family="'Courier New', monospace" font-size="22" fill="#6ab8b0" letter-spacing="3" opacity="0.8">Motion Control Module Skills</text>

  <!-- 하단 3-layer 아이콘 표시 -->
  <g opacity="0.4" transform="translate(540, 970)">
    <rect x="-90" y="-12" width="60" height="24" rx="4" fill="none" stroke="#4ecdc4" stroke-width="1"/>
    <text x="-60" y="5" text-anchor="middle" font-family="monospace" font-size="10" fill="#4ecdc4">CORE</text>
    <rect x="-20" y="-12" width="40" height="24" rx="4" fill="none" stroke="#4ecdc4" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" font-family="monospace" font-size="10" fill="#4ecdc4">API</text>
    <rect x="30" y="-12" width="60" height="24" rx="4" fill="none" stroke="#4ecdc4" stroke-width="1"/>
    <text x="60" y="5" text-anchor="middle" font-family="monospace" font-size="10" fill="#4ecdc4">CLR</text>
  </g>
</svg>
